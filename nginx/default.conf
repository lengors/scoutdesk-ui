server {
    listen 9999;
    listen [::]:9999;

    location / {
      root /usr/share/nginx/html;
      include /etc/nginx/mime.types;
      try_files $uri /$uri /index.html =404;
    }
}

server {
    listen 9113;
    listen [::]:9113;

    location /status {
        stub_status;
        allow all;
    }

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}